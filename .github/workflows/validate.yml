name: Validate Watcher

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      target_repo:
        description: Public configured repo to use for dry-run validation
        required: false
        type: string
        default: "geneontology/go-ontology"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].sort.each { |f| YAML.load_file(f); puts "validated #{f}" }'

      - name: Compile Python sources
        run: python -m compileall src scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate target selection
        run: |
          python scripts/select_targets.py \
            --config config/targets.json \
            --event-name workflow_dispatch \
            --target-repo geneontology/go-ontology \
            --output-file build/validate-selector/matrix.json

      - name: Dry-run watcher
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WATCHER_SOURCE_TOKEN: ${{ secrets.WATCHER_SOURCE_TOKEN }}
          TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || 'geneontology/go-ontology' }}
        run: |
          set -euo pipefail
          python scripts/run_watch.py \
            --config config/targets.json \
            --target "${TARGET_REPO}" \
            --lookback-days 3 \
            --max-items 5 \
            --output-dir build/validate \
            --dry-run

      - name: Dry-run setup review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WATCHER_SOURCE_TOKEN: ${{ secrets.WATCHER_SOURCE_TOKEN }}
        run: |
          set -euo pipefail
          python scripts/run_setup_review.py \
            --config config/targets.json \
            --target geneontology/go-ontology \
            --target obophenotype/cell-ontology \
            --output-dir build/validate-setup-review

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: watcher-validation-preview
          path: |
            build/validate
            build/validate-setup-review

      - name: Publish validation summary
        run: |
          cat build/validate/summary.md >> "${GITHUB_STEP_SUMMARY}"
          printf '\n\n## Setup Review Preview\n\n' >> "${GITHUB_STEP_SUMMARY}"
          cat build/validate-setup-review/summary.md >> "${GITHUB_STEP_SUMMARY}"
