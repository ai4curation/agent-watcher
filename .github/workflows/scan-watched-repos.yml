name: Claude Review Watched Repos

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:
    inputs:
      target_repo:
        description: Optional configured target repo (owner/name)
        required: false
        type: string
        default: ""
      lookback_days:
        description: Override lookback window in days
        required: false
        type: string
        default: "14"
      max_items:
        description: Override max recent issues or PRs scanned per target
        required: false
        type: string
        default: "25"

permissions:
  contents: read
  issues: write

concurrency:
  group: claude-watcher-scan
  cancel-in-progress: false

jobs:
  select-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      lookback_days: ${{ steps.select.outputs.lookback_days }}
      max_items: ${{ steps.select.outputs.max_items }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select configured targets
        id: select
        env:
          TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || '' }}
          LOOKBACK_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_days || '14' }}
          MAX_ITEMS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_items || '25' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("config/targets.json").read_text())
          target_repo = os.environ.get("TARGET_REPO", "").strip()
          targets = payload.get("targets", [])
          if target_repo:
              targets = [target for target in targets if target["repo"] == target_repo]
          if not targets:
              raise SystemExit("No configured targets matched the requested filter.")

          matrix = {
              "include": [
                  {
                      "repo": target["repo"],
                      "display_name": target.get("display_name", target["repo"]),
                      "slug": target["repo"].replace("/", "__"),
                  }
                  for target in targets
              ]
          }

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              print(f"matrix={json.dumps(matrix)}", file=handle)
              print(f"lookback_days={os.environ['LOOKBACK_DAYS']}", file=handle)
              print(f"max_items={os.environ['MAX_ITEMS']}", file=handle)
          PY

  review-target:
    needs: select-targets
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-targets.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Generate neutral activity context
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WATCHER_SOURCE_TOKEN: ${{ secrets.WATCHER_SOURCE_TOKEN }}
        run: |
          python scripts/run_watch.py \
            --config config/targets.json \
            --target "${{ matrix.repo }}" \
            --lookback-days "${{ needs.select-targets.outputs.lookback_days }}" \
            --max-items "${{ needs.select-targets.outputs.max_items }}" \
            --output-dir build/context \
            --dry-run

      - name: Upload context artifact
        uses: actions/upload-artifact@v4
        with:
          name: watcher-context-${{ matrix.slug }}
          path: build/context/${{ matrix.slug }}.*

      - name: Verify Claude credentials are configured
        env:
          HAS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && 'true' || 'false' }}
          HAS_CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' && 'true' || 'false' }}
        run: |
          if [ "${HAS_ANTHROPIC_API_KEY}" != "true" ] && [ "${HAS_CLAUDE_CODE_OAUTH_TOKEN}" != "true" ]; then
            echo "::error::Set either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN for the Claude review workflow."
            exit 1
          fi

      - name: Ask Claude for qualitative review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the last `${{ needs.select-targets.outputs.lookback_days }}` days of agent-related GitHub activity for `${{ matrix.repo }}`.

            Start with the local context file `@build/context/${{ matrix.slug }}.md`.

            Your job is to maintain a rolling watcher issue in `${{ github.repository }}` titled `Watcher: ${{ matrix.repo }}`.

            Required workflow:
            1. Read the local context file.
            2. Use that dossier as the evidence base for your review. Do not rely on live reads from `${{ matrix.repo }}`.
            3. Find the rolling issue in `${{ github.repository }}` by exact title. If it does not exist, create it. If it exists and is closed, reopen it.
            4. Replace the issue body with a concise current-status summary for this run.
            5. Append a new dated comment with the fuller qualitative review.

            The review should emphasize:
            - what seems to be working
            - what seems not to be working
            - recurring failure modes or friction
            - light quantitative context only when useful, such as number of summons or number of agent-touched PRs/issues

            Constraints:
            - Do not assign a score or labels like strong, mixed, needs_attention, or pass/fail.
            - Be concrete and cite issue/PR numbers.
            - Keep the body concise and the appended comment substantial but practical.
            - Use Markdown headings and flat bullets only when they help readability.

            Command guidance:
            - Find the issue with something like `gh issue list --repo "${{ github.repository }}" --state all --search '"Watcher: ${{ matrix.repo }}" in:title' --json number,title,state`
            - Create it with `gh issue create --repo "${{ github.repository }}"`
            - Update it with `gh issue edit --repo "${{ github.repository }}"`
            - Reopen it with `gh issue reopen --repo "${{ github.repository }}"`
            - Append the full review with `gh issue comment --repo "${{ github.repository }}"`

            You may create temporary markdown files under `build/claude/` before posting.
          claude_args: |
            --allowedTools "Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Bash(gh issue list:*),Bash(gh issue create:*),Bash(gh issue edit:*),Bash(gh issue reopen:*),Bash(gh issue comment:*),Read,Write,Edit"

      - name: Publish matrix summary
        run: cat build/context/${{ matrix.slug }}.md >> "${GITHUB_STEP_SUMMARY}"
